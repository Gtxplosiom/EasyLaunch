<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link href="../styles/modal.css" rel="stylesheet" />
    <title>Add</title>
</head>
<body>
    <form id="item-form">
        <div class="modal-inputs" id="modal-inputs">
            <div class="modal-input">
                <span>Item Name:</span>
                <input type="text" id="item-name" />
            </div>
            <div class="modal-input">
                <span>Item Type:</span>
                <select name="item-type" id="item-type">
                    <option value="executable">Executable</option>
                    <option value="rom">ROM</option>
                    <option value="custom-script">Custom Script</option>
                    <option value="others">Others</option>
                </select>
            </div>
            <div class="modal-input" id="item-path-div">
                <span>Select Item:</span>
                <button type="button" class="item-path-btn" id="item-path-btn"></button>
                <label id="item-path-label">...</label>
            </div>
            <div class="modal-input">
                <span>Conditions:</span>
                <select name="conditions" id="conditions">
                    <option value="normal">Run Normally</option>
                    <option value="admin">Run as Administrator</option>
                </select>
            </div>
        </div>
        <div class="modal-buttons">
            <button id="add-item-btn" type="submit">Add</button>
            <button id="close-modal-btn" type="button">Cancel</button>
        </div>
    </form>
    <script src="../scripts/renderer.js"></script>
</body>
</html>
